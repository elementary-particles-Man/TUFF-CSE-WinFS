name: Draft GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: RC tag name, for example v1.0.0-rc1
        required: true
        type: string
      target_commitish:
        description: Commit SHA to associate with the RC tag
        required: true
        type: string
      artifact_run_id:
        description: Optional run id for the public release artifact workflow
        required: false
        type: string
      artifact_path:
        description: Optional local path to a verified release bundle
        required: false
        type: string

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_commitish }}

      - name: Validate release tooling
        shell: pwsh
        run: |
          git --version
          gh --version

      - name: Resolve release bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          ARTIFACT_PATH: ${{ inputs.artifact_path }}
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE ".tuff-cse-winfs-dev\p7c-draft-release"
          if (Test-Path $bundleRoot) {
            Remove-Item $bundleRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null

          if (-not [string]::IsNullOrWhiteSpace($env:ARTIFACT_PATH)) {
            $resolved = Resolve-Path $env:ARTIFACT_PATH
            if (Test-Path $resolved.Path -PathType Container) {
              Copy-Item (Join-Path $resolved.Path '*') -Destination $bundleRoot -Recurse -Force
            }
            else {
              Copy-Item $resolved.Path -Destination $bundleRoot -Force
            }
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:ARTIFACT_RUN_ID)) {
            gh run download $env:ARTIFACT_RUN_ID -n public-release-artifact-bundle -D $bundleRoot
          }
          else {
            throw "artifact_path or artifact_run_id is required."
          }

          Get-ChildItem -Path $bundleRoot | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Build draft release input
        shell: pwsh
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          TARGET_COMMITISH: ${{ inputs.target_commitish }}
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE ".tuff-cse-winfs-dev\p7c-draft-release"
          $artifactZip = Get-ChildItem -Path $bundleRoot -File -Filter "*-public-windows-installer.zip" | Select-Object -First 1
          if (-not $artifactZip) { throw "Public installer zip not found in $bundleRoot" }

          $manifest = Join-Path $bundleRoot "V1_RC_ARTIFACT_MANIFEST.json"
          $checksums = Join-Path $bundleRoot "V1_RC_CHECKSUMS.sha256"
          $notes = Join-Path $bundleRoot "V1_RC_RELEASE_NOTES.md"
          foreach ($path in @($manifest, $checksums, $notes, $artifactZip.FullName)) {
            if (-not (Test-Path $path)) { throw "Missing release asset: $path" }
          }

          $input = [pscustomobject]@{
            schema_version  = "2026-07-p7c"
            release_line    = "TUFF-CSE-WinFS v1 RC"
            tag_name        = $env:TAG_NAME
            target_commitish = $env:TARGET_COMMITISH
            release_name    = "TUFF-CSE-WinFS $($env:TAG_NAME) draft release"
            draft           = $true
            prerelease      = $true
            publish         = $false
            artifact_manifest = $manifest
            checksums       = $checksums
            release_notes   = $notes
            assets = @(
              [pscustomobject]@{
                kind  = "portable_zip"
                name  = $artifactZip.Name
                path  = $artifactZip.FullName
                label = "public windows installer zip"
              },
              [pscustomobject]@{
                kind  = "artifact_manifest"
                name  = "V1_RC_ARTIFACT_MANIFEST.json"
                path  = $manifest
                label = "release manifest"
              },
              [pscustomobject]@{
                kind  = "checksums"
                name  = "V1_RC_CHECKSUMS.sha256"
                path  = $checksums
                label = "checksum report"
              },
              [pscustomobject]@{
                kind  = "release_notes"
                name  = "V1_RC_RELEASE_NOTES.md"
                path  = $notes
                label = "draft release notes"
              }
            )
          }

          $inputPath = Join-Path $bundleRoot "V1_RC_DRAFT_RELEASE_INPUT.json"
          $input | ConvertTo-Json -Depth 8 | Set-Content -Path $inputPath -Encoding utf8

      - name: Verify draft release inputs
        shell: pwsh
        run: |
          .\release\verify-draft-release-inputs.ps1 -InputPath "$env:GITHUB_WORKSPACE\.tuff-cse-winfs-dev\p7c-draft-release\V1_RC_DRAFT_RELEASE_INPUT.json"

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\release\create-draft-github-release.ps1 -InputPath "$env:GITHUB_WORKSPACE\.tuff-cse-winfs-dev\p7c-draft-release\V1_RC_DRAFT_RELEASE_INPUT.json"
