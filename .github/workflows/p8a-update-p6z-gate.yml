name: P8A Update P6Z Gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/p8a-live-driver-install-boundary

      - name: Update frozen RC source gate for explicit post-RC P8A path
        shell: python
        run: |
          from pathlib import Path

          path = Path("tests/p6z_v1_rc_release_gate.rs")
          text = path.read_text()
          start_marker = "    #[test]\n    fn v1_rc_release_gate_source_tree_stays_free_of_live_integrations() {"
          start = text.find(start_marker)
          if start < 0:
              raise SystemExit("expected P6Z gate function not found")
          end = text.find("\n    }\n}", start)
          if end < 0:
              raise SystemExit("P6Z gate function terminator not found")
          end += len("\n    }")

          replacement = '''    #[test]
          fn v1_rc_gate_keeps_non_p8a_live_integrations_closed() {
              let repo_root = PathBuf::from(env!("CARGO_MANIFEST_DIR"));
              let src_root = repo_root.join("src");
              assert_no_forbidden_strings(
                  &src_root,
                  &[
                      "CloudKmsClient",
                      "Pkcs11Session",
                      "AnchorProvider",
                      "RawLba",
                      "partition resize",
                      "KmsSecret",
                      "HsmSecret",
                  ],
              );

              let driver_source = fs::read_to_string(src_root.join("driver.rs")).unwrap();
              let install_source = fs::read_to_string(src_root.join("install.rs")).unwrap();
              assert!(driver_source.contains("pnputil.exe"));
              assert!(install_source.contains("live_driver_install"));
              assert!(install_source.contains("install_driver_package_live"));
              assert_eq!(tuff_cse_winfs::P8A_LIVE_DRIVER_INSTALL_PHASE, "P8A");
          }'''.replace("          ", "    ")

          path.write_text(text[:start] + replacement + text[end:])

      - name: Commit gate update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/p6z_v1_rc_release_gate.rs
          git commit -m "test: preserve P6Z gate across explicit P8A install path"
          git push origin HEAD:feature/p8a-live-driver-install-boundary
