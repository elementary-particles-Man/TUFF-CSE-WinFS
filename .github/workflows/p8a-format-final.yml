name: P8A Final Format

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/p8a-live-driver-install-boundary

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format and push
        shell: bash
        run: |
          cargo fmt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format final P8A implementation"
          git push origin HEAD:feature/p8a-live-driver-install-boundary
