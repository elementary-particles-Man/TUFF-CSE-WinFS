name: Verify Draft Read Credential

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing RC tag to verify
        required: true
        type: string
        default: v1.0.0-rc2
      release_name:
        description: Expected draft release name
        required: true
        type: string
        default: TUFF-CSE-WinFS v1.0.0-rc2
      expected_target_commitish:
        description: Expected RC tag and release target commit
        required: true
        type: string
        default: 08d0d252857d5140baa355d894e921a6a408318e
      artifact_run_id:
        description: Source Public Release Artifact workflow run
        required: true
        type: string
        default: "29277061565"
      expected_rc1_metadata_sha256:
        description: Fixed normalized RC1 metadata SHA256
        required: true
        type: string
        default: c210fafa095d58f53f3954f737110f3a442c4ef8ba09ccd8ec47a18c11869d8a

permissions:
  contents: read
  actions: read

jobs:
  verify-draft-read-credential:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout verification tooling
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify draft read credential
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.P7G_DRAFT_READ_FINE_GRAINED_TOKEN }}
        run: |
          .\release\verify-draft-read-credential.ps1 `
            -Repository "${{ github.repository }}" `
            -TagName "${{ inputs.tag_name }}" `
            -ReleaseName "${{ inputs.release_name }}" `
            -ExpectedTargetCommitish "${{ inputs.expected_target_commitish }}" `
            -ArtifactRunId "${{ inputs.artifact_run_id }}" `
            -ExpectedRc1MetadataSha256 "${{ inputs.expected_rc1_metadata_sha256 }}" `
            -Rc1ReleaseId 350514171 `
            -Rc2ReleaseId 353395540 `
            -OutputDirectory "$env:GITHUB_WORKSPACE\p7h-evidence"

      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: tuff-cse-winfs-p7h-draft-read-credential-evidence
          path: p7h-evidence
          if-no-files-found: error
          retention-days: 30
