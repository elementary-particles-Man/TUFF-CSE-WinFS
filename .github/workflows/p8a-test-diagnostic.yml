name: P8A Test Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests and capture log
        shell: bash
        run: |
          set +e
          cargo test --all-targets 2>&1 | tee p8a-test.log
          status=${PIPESTATUS[0]}
          echo "$status" > p8a-test-status.txt
          exit 0

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: p8a-test-log
          path: |
            p8a-test.log
            p8a-test-status.txt
          if-no-files-found: error
          retention-days: 1
