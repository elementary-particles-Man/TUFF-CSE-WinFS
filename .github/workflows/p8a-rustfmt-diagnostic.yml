name: P8A Rustfmt Diagnostic

on:
  push:
    branches:
      - feature/p8a-live-driver-install-boundary

permissions:
  contents: read

jobs:
  rustfmt-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Generate rustfmt patch
        shell: bash
        run: |
          cargo fmt
          git diff --binary > p8a-rustfmt.patch
          test -s p8a-rustfmt.patch

      - name: Upload rustfmt patch
        uses: actions/upload-artifact@v4
        with:
          name: p8a-rustfmt-patch
          path: p8a-rustfmt.patch
          if-no-files-found: error
          retention-days: 1
